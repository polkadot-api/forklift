# Single-chain example
# Fork Polkadot at a specific block and listen on port 3000
endpoint: wss://rpc.polkadot.io
block: 30_000_000 # block number or hex hash (default: latest finalized)
port: 3000 # default: 3000

options:
  disableOnIdle: true # skip on_idle hooks (e.g. rebagging) during block production
  buildBlockMode: manual # "manual" or { timer: <ms> } — default: { timer: 100 }
  finalizeMode: { timer: 2000 } # "manual" or { timer: <ms> } — default: { timer: 2000 }

storage:
  # Raw override: 0x-prefixed hex key and value (null to delete)
  - key: "0x3f1467a096bcd71a5b6a0c8155e208103f2edf3bdf381debe331ab7446addfdc"
    value: "0x00008a5d784563010000000000000000"

  # Decoded override: pallet + storage entry + key + value
  # Encoded against the chain's metadata at startup
  - pallet: System
    entry: Account
    key:
      - "5GrwvaEF5zXb26Fz9rcQpDWS57CtERHpNehXCPcNoHGKutQY"
    value:
      nonce: 0
      consumers: 0
      providers: 1
      sufficients: 0
      data:
        {
          free: 100_0_000_000_000n,
          reserved: 0n,
          frozen: 0n,
          flags: 170141183460469231731687303715884105728n,
        }
